workflows:
  ios-testflight:
    name: Meu Sindicato iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: meu-sindicato-app-store
    environment:
      node: 20
      xcode: latest
      vars:
        BUNDLE_ID: br.com.agenciaallier.meusindicato
        APPLE_TEAM_ID: K923QMZPYP
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_VERSION: "1.0"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor iOS project
        script: |
          npm run build
          npx capacitor-assets generate --ios
          npx cap sync ios
      - name: Configure signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create --delete-stale-profiles
          keychain add-certificates
          xcode-project use-profiles \
            --project "$XCODE_PROJECT" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging
      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$APP_VERSION"
          agvtool new-version -all "$BUILD_NUMBER"
          cd ../..
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist" \
            --archive-xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
