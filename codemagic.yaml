workflows:
  ios-testflight:
    name: Meu Sindicato iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: meu-sindicato-app-store
    environment:
      node: 20
      xcode: latest
      vars:
        BUNDLE_ID: br.com.agenciaallier.meusindicato
        APPLE_TEAM_ID: K923QMZPYP
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_VERSION: "1.0"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor iOS project
        script: |
          npm run build
          npx capacitor-assets generate --ios
          npx cap sync ios
      - name: Configure signing
        script: |
          keychain initialize
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          CERTIFICATES_DIR="$HOME/Library/MobileDevice/Certificates"
          CERTIFICATE_PRIVATE_KEY="/tmp/codemagic_apple_distribution.key"
          mkdir -p "$PROFILES_DIR" "$CERTIFICATES_DIR"
          openssl genrsa -out "$CERTIFICATE_PRIVATE_KEY" 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles \
            --certificate-key "@file:$CERTIFICATE_PRIVATE_KEY" \
            --profiles-dir "$PROFILES_DIR" \
            --certificates-dir "$CERTIFICATES_DIR"
          PROFILE_PATH="$(find "$PROFILES_DIR" -name "*.mobileprovision" -print -quit)"
          if [ -z "$PROFILE_PATH" ]; then
            echo "No App Store provisioning profile was found for $BUNDLE_ID"
            exit 1
          fi
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)"
          echo "Using provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "export IOS_PROFILE_UUID=$PROFILE_UUID" > /tmp/ios_profile.env
          echo "export IOS_PROFILE_NAME=\"$PROFILE_NAME\"" >> /tmp/ios_profile.env
          echo "IOS_PROFILE_UUID=$PROFILE_UUID" >> "$CM_ENV"
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$CM_ENV"
          keychain add-certificates
          xcode-project use-profiles \
            --project "$XCODE_PROJECT" \
            --profile "$PROFILE_PATH" \
            --archive-method app-store \
            --code-signing-setup-verbose-logging
      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$APP_VERSION"
          agvtool new-version -all "$BUILD_NUMBER"
          cd ../..
      - name: Build IPA
        script: |
          if [ -f /tmp/ios_profile.env ]; then
            source /tmp/ios_profile.env
          fi
          if [ -z "$IOS_PROFILE_UUID" ]; then
            echo "IOS_PROFILE_UUID is empty; provisioning profile was not exported from Configure signing"
            exit 1
          fi
          echo "Building with provisioning profile: $IOS_PROFILE_NAME ($IOS_PROFILE_UUID)"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist" \
            --archive-xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
