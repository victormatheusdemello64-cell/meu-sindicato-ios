workflows:
  ios-testflight:
    name: Meu Sindicato iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: meu-sindicato-app-store
    environment:
      node: 20
      xcode: latest
      vars:
        BUNDLE_ID: br.com.agenciaallier.meusindicato
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_VERSION: "1.0"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.agenciaallier.meusindicato
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor iOS project
        script: |
          npm run build
          npx capacitor-assets generate --ios
          npx cap sync ios
      - name: Configure signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$APP_VERSION"
          agvtool new-version -all "$BUILD_NUMBER"
          cd ../..
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
